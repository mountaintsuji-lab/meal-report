
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>食事集計レポート - 能日葬祭</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">

  <div class="max-w-6xl mx-auto p-6">
    <header class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">食事集計ダッシュボード</h1>
        <p class="text-slate-500 text-sm">能日葬祭 マネージャー報告用</p>
      </div>
      <div class="text-right">
        <span class="px-3 py-1 bg-white border border-slate-200 rounded-full text-xs font-semibold text-slate-600 shadow-sm">
          最終更新: 2026/05/08 00:05
        </span>
      </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <div class="relative overflow-hidden bg-gradient-to-br from-indigo-600 to-blue-500 rounded-3xl p-8 text-white shadow-xl shadow-indigo-200">
        <p class="text-indigo-100 text-sm font-bold uppercase tracking-wider">Total Quantity / 合計数量</p>
        <div class="flex items-baseline mt-4">
          <h2 class="text-5xl font-black">12,131</h2>
          <span class="ml-2 text-xl font-medium text-indigo-100">件</span>
        </div>
        <div class="absolute -right-4 -bottom-4 opacity-20">
          <svg width="120" height="120" fill="currentColor" viewBox="0 0 24 24"><path d="M5 21h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2zM9 17h2v-7H9v7zm4 0h2V7h-2v10z"></path></svg>
        </div>
      </div>

      <div class="relative overflow-hidden bg-gradient-to-br from-emerald-500 to-teal-400 rounded-3xl p-8 text-white shadow-xl shadow-emerald-200">
        <p class="text-emerald-50 text-sm font-bold uppercase tracking-wider">Total Amount / 合計金額</p>
        <div class="flex items-baseline mt-4">
          <span class="text-2xl font-bold mr-1">¥</span>
          <h2 class="text-5xl font-black">25,054,700</h2>
        </div>
        <div class="absolute -right-4 -bottom-4 opacity-20">
          <svg width="120" height="120" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14h-2v-2h2v2zm0-4h-2V7h2v5z"></path></svg>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
        <h3 class="text-lg font-bold mb-6 text-slate-700 flex items-center">
          <span class="w-2 h-6 bg-indigo-500 rounded-full mr-3"></span>月間数量推移
        </h3>
        <div class="h-[300px]">
          <canvas id="trendChart"></canvas>
        </div>
      </div>

      <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
        <h3 class="text-lg font-bold mb-6 text-slate-700 flex items-center">
          <span class="w-2 h-6 bg-emerald-500 rounded-full mr-3"></span>メニュー別内訳
        </h3>
        <div class="h-[300px] flex items-center justify-center">
          <canvas id="breakdownChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 月間推移グラフ
    new Chart(document.getElementById('trendChart'), {
      type: 'line',
      data: {
        labels: ["月","7月","8月","9月","10月","11月","12月","1月","2月","3月","4月","5月"],
        datasets: [{
          label: '注文数',
          data: ["数量",640,897,1012,1188,886,1263,1053,1316,1105,789,809],
          borderColor: '#6366f1',
          borderWidth: 4,
          backgroundColor: 'rgba(99, 102, 241, 0.1)',
          fill: true,
          tension: 0.4,
          pointRadius: 6,
          pointHoverRadius: 8,
          pointBackgroundColor: '#fff',
          pointBorderColor: '#6366f1',
          pointBorderWidth: 3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { 
          y: { beginAtZero: true, grid: { borderDash: [5, 5], color: '#e2e8f0' } },
          x: { grid: { display: false } }
        }
      }
    });

    // 品別内訳グラフ
    new Chart(document.getElementById('breakdownChart'), {
      type: 'doughnut',
      data: {
        labels: ["商品名","R-15","R-22","R-30","R-40","R-50","KS-08","合計"],
        datasets: [{
          data: ["回数",363,200,30,12,6,140,751],
          backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#3b82f6', '#8b5cf6', '#ec4899'],
          borderWidth: 0,
          hoverOffset: 20
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '75%',
        plugins: { 
          legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } } 
        }
      }
    });
  </script>
</body>
</html>
