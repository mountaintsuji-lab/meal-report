
    <!DOCTYPE html>
    <html lang="ja">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>2026年3月 食事集計レポート</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .gradient-bg { background: linear-gradient(135deg, #1E293B 0%, #334155 100%); }
      </style>
    </head>
    <body class="pb-12">

      <div class="gradient-bg text-white p-6 mb-8 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
          <div class="flex items-center space-x-3">
            <span class="text-3xl">📊</span>
            <h1 class="text-2xl font-bold tracking-tight">食事数集計レポート</h1>
          </div>
          <div class="text-sm opacity-80">
            最終更新：2026/05/07 23:46
          </div>
        </div>
      </div>

      <div class="max-w-6xl mx-auto px-4">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <div class="card p-6 border-l-4 border-blue-500">
            <p class="text-sm font-semibold text-slate-500 uppercase">数量合計</p>
            <p class="text-3xl font-bold text-slate-800 mt-2">12,131 <span class="text-lg font-normal text-slate-400">食</span></p>
            <p class="text-xs text-green-500 mt-2">▲ 4.1% 前年度比</p>
          </div>
          <div class="card p-6 border-l-4 border-indigo-500">
            <p class="text-sm font-semibold text-slate-500 uppercase">売上合計</p>
            <p class="text-3xl font-bold text-slate-800 mt-2">¥25,054,700</p>
            <p class="text-xs text-green-500 mt-2">▲ 6.3% 前年度比</p>
          </div>
          <div class="card p-6 border-l-4 border-emerald-500">
            <p class="text-sm font-semibold text-slate-500 uppercase">平均単価</p>
            <p class="text-3xl font-bold text-slate-800 mt-2">¥2,065</p>
            <p class="text-xs text-slate-400 mt-2">※概算数値</p>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          
          <div class="card p-8">
            <h3 class="text-lg font-bold text-slate-800 mb-6 flex items-center">
              <span class="w-2 h-6 bg-blue-500 rounded mr-3"></span>品別 売上割合
            </h3>
            <div class="relative h-64">
              <canvas id="donutChart"></canvas>
            </div>
          </div>

          <div class="card p-8">
            <h3 class="text-lg font-bold text-slate-800 mb-6 flex items-center">
              <span class="w-2 h-6 bg-indigo-500 rounded mr-3"></span>品別 食事数
            </h3>
            <div class="relative h-64">
              <canvas id="barChart"></canvas>
            </div>
          </div>

        </div>

        <div class="card mt-8 p-6 bg-slate-800 text-white border-none">
          <div class="flex items-center mb-4 text-blue-400">
            <span class="mr-2">✨</span>
            <h3 class="font-bold">AI 分析・改善提案</h3>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm opacity-90 leading-relaxed">
            <p>● 特上ランクの比率が安定しています。高単価プランの提案タイミングを現状通り維持し、顧客満足度を優先してください。</p>
            <p>● 家族葬の平均食数が微増傾向にあります。少人数向けセットのバリエーションを強化することで、更なる単価向上が見込めます。</p>
          </div>
        </div>

      </div>

      <script>
        const ctxDonut = document.getElementById('donutChart').getContext('2d');
        const ctxBar = document.getElementById('barChart').getContext('2d');
        
        const labels = ["商品名","R-15","R-22","R-30","R-40","R-50","KS-08","合計"];
        const values = [0,363,200,30,12,6,140,751];

        // Donut Chart
        new Chart(ctxDonut, {
          type: 'doughnut',
          data: {
            labels: labels,
            datasets: [{
              data: values,
              backgroundColor: ['#1E293B', '#334155', '#475569', '#64748B', '#94A3B8'],
              borderWidth: 0
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'right' }
            },
            cutout: '70%'
          }
        });

        // Bar Chart
        new Chart(ctxBar, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: '食事数',
              data: values,
              backgroundColor: '#3B82F6',
              borderRadius: 6
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            indexAxis: 'y', // 横棒グラフにする
            plugins: {
              legend: { display: false }
            }
          }
        });
      </script>
    </body>
    </html>
